<app-manifiesto-form #form [manifiestoEditar]="manifiestoSeleccionado" (manifiestoGuardado)="cargarTodos()" />

<div class="tabla-container">
  <div class="tabla-header">
    <span class="tabla-titulo">Gestión de Manifiestos</span>
    <div class="tabla-acciones">
      <input #busquedaInput type="number" placeholder="Buscar ID (F3)..." [(ngModel)]="buscarId" (keyup.enter)="filtrarPorId()" />
      <button class="btn-limpiar" (click)="buscarId = null; cargarTodos()">Limpiar</button>
      <button class="btn-nuevo" (click)="form.abrirNuevo()">+ Nuevo <kbd>F2</kbd></button>
    </div>
  </div>

  <div *ngIf="cargando" class="estado">Cargando datos...</div>

  <div class="tabla-scroll" *ngIf="!cargando && !error">
    <table>
      <thead>
        <tr>
          <th>Manifiesto</th>
          <th>Transportista</th>
          <th>Chofer</th>
          <th>Destino</th>
          <th>Estatus</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of manifiestos">
          <td><strong>{{ m.manifiesto }}</strong></td>
          <td>{{ m.transportista }}</td>
          <td>{{ m.chofer }}</td>
          <td>{{ m.destino }}</td>
          <td><span [class]="'badge ' + getBadgeClass(m.estatus)">{{ m.estatus }}</span></td>
          <td class="col-acciones">
            <button class="btn-editar" (click)="seleccionarEditar(m)">Editar</button>
            <button class="btn-eliminar" (click)="eliminar(m)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
